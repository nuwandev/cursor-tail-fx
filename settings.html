<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CursorTrail Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: rgba(30, 30, 46, 0.85);
            /* Catppuccin Mocha Base */
            --bg-surface: rgba(49, 50, 68, 0.6);
            --bg-surface-hover: rgba(69, 71, 90, 0.8);
            --text-main: #cdd6f4;
            --text-muted: #a6adc8;
            --accent: #f38ba8;
            --accent-glow: rgba(243, 139, 168, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Glassmorphism backing */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Header / Drag Region */
        header {
            padding: 20px 24px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* Allow dragging the window from the header */
            -webkit-app-region: drag;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0;
            background: linear-gradient(135deg, #f38ba8, #cba6f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Tabs */
        .tabs {
            display: flex;
            padding: 0 24px;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            -webkit-app-region: no-drag;
        }

        .tab {
            padding: 10px 0;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }

        .tab:hover {
            color: var(--text-main);
        }

        .tab.active {
            color: var(--accent);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            border-radius: 2px 2px 0 0;
            box-shadow: 0 -2px 8px var(--accent-glow);
        }

        /* Content Area */
        .content {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            -webkit-app-region: no-drag;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Grids and Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        button.card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-main);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            position: relative;
            overflow: hidden;
        }

        button.card:hover {
            background: var(--bg-surface-hover);
            transform: translateY(-1px);
            border-color: var(--border-active);
        }

        button.card.active {
            border-color: var(--accent);
            background: rgba(243, 139, 168, 0.05);
            box-shadow: 0 4px 12px rgba(243, 139, 168, 0.15);
        }

        button.card .title {
            font-weight: 600;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 4px;
        }

        button.card .desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: block;
        }

        /* Color Dot for Themes */
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
            box-shadow: 0 0 8px currentColor;
        }

        /* Sliders */
        .slider-group {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .slider-header span {
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
            margin: 0;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s, background-color 0.2s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: var(--accent);
        }

        /* Footer */
        footer {
            padding: 16px 24px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.1);
        }

        footer span {
            color: var(--accent);
            font-weight: 600;
        }
    </style>
    <script type="module" src="/src/settings.ts" defer></script>
</head>

<body>
    <header>
        <h1>CursorTrail</h1>
    </header>

    <div class="tabs">
        <div class="tab active" data-target="tab-looks">Looks</div>
        <div class="tab" data-target="tab-tuning">Tuning</div>
    </div>

    <div class="content">
        <!-- Looks Tab -->
        <div id="tab-looks" class="tab-content active">

            <h3
                style="font-size: 0.8rem; color: var(--text-muted); margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 0.05em;">
                Color Theme</h3>
            <div class="grid">
                <button class="card theme-btn active" data-theme="cyan">
                    <span class="title"><span class="color-dot" style="background:#00ccff; color:#00ccff;"></span>Cyan
                        Glow</span>
                </button>
                <button class="card theme-btn" data-theme="neon">
                    <span class="title"><span class="color-dot" style="background:#ff00ff; color:#ff00ff;"></span>Neon
                        Pink</span>
                </button>
                <button class="card theme-btn" data-theme="fire">
                    <span class="title"><span class="color-dot"
                            style="background:#ff4500; color:#ff4500;"></span>Fire</span>
                </button>
                <button class="card theme-btn" data-theme="minimal">
                    <span class="title"><span class="color-dot"
                            style="background:#ffffff; color:#ffffff;"></span>Minimal</span>
                </button>
            </div>

            <h3
                style="font-size: 0.8rem; color: var(--text-muted); margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 0.05em;">
                Particle Effect</h3>
            <div class="grid">
                <button class="card effect-btn active" data-effect="comet">
                    <span class="title">Comet ☄️</span>
                    <span class="desc">Classic shrinking tail</span>
                </button>
                <button class="card effect-btn" data-effect="sparkle">
                    <span class="title">Sparkle ✨</span>
                    <span class="desc">Twinkling fairy dust</span>
                </button>
                <button class="card effect-btn" data-effect="orb">
                    <span class="title">Orbs 🫧</span>
                    <span class="desc">Expanding soft glows</span>
                </button>
                <button class="card effect-btn" data-effect="rainbow">
                    <span class="title">Rainbow 🌈</span>
                    <span class="desc">Dynamic hue shifting</span>
                </button>
            </div>

        </div>

        <!-- Tuning Tab -->
        <div id="tab-tuning" class="tab-content">

            <div class="slider-group">
                <div class="slider-header">Opacity <span id="opacity-val">100%</span></div>
                <input type="range" id="opacity" min="0.1" max="1.0" step="0.1" value="1.0">
            </div>

            <div class="slider-group">
                <div class="slider-header">Trail Length <span id="length-val">1.0x</span></div>
                <input type="range" id="length" min="0.1" max="3.0" step="0.1" value="1.0">
            </div>

            <div class="slider-group">
                <div class="slider-header">Particle Size <span id="size-val">1.0x</span></div>
                <input type="range" id="size" min="0.1" max="3.0" step="0.1" value="1.0">
            </div>

        </div>
    </div>

    <footer>
        Developed by <span>S N C</span>
    </footer>
</body>

</html>
