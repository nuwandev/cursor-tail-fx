<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CursorTrail Settings</title>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            color: #f38ba8;
        }

        .section {
            background: #313244;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .section h2 {
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 15px;
            color: #89b4fa;
        }

        .theme-btn {
            background: #45475a;
            color: white;
            border: 2px solid transparent;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            font-weight: bold;
            transition: 0.2s;
        }

        .theme-btn:hover {
            background: #585b70;
        }

        .theme-btn.active {
            border-color: #a6e3a1;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .slider-group:last-child {
            margin-bottom: 0;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            color: #bac2de;
        }

        .slider-header span {
            color: #a6e3a1;
            font-weight: bold;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #f38ba8;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #45475a;
            border-radius: 2px;
        }

        .credit {
            margin-top: auto;
            text-align: center;
            font-size: 0.9rem;
            color: #a6adc8;
            padding-top: 20px;
            border-top: 1px solid #45475a;
        }

        .credit span {
            color: #f9e2af;
            font-weight: bold;
        }
    </style>
    <script type="module" src="/src/settings.ts" defer></script>
</head>

<body>
    <h1>CursorTrail</h1>

    <div class="section">
        <h2>Trail Theme</h2>
        <button class="theme-btn active" data-theme="cyan" style="border-left-color: #00cccc;">Cyan Glow</button>
        <button class="theme-btn" data-theme="neon" style="border-left-color: #ff00ff;">Neon Pink</button>
        <button class="theme-btn" data-theme="fire" style="border-left-color: #ff4500;">Fire Intensity</button>
        <button class="theme-btn" data-theme="minimal" style="border-left-color: #ffffff;">Minimal White</button>
    </div>

    <div class="section">
        <h2>Advanced Tuning</h2>

        <div class="slider-group">
            <div class="slider-header">Opacity <span id="opacity-val">100%</span></div>
            <input type="range" id="opacity" min="0.1" max="1.0" step="0.1" value="1.0">
        </div>

        <div class="slider-group">
            <div class="slider-header">Trail Length <span id="length-val">1.0x</span></div>
            <input type="range" id="length" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>

        <div class="slider-group">
            <div class="slider-header">Particle Size <span id="size-val">1.0x</span></div>
            <input type="range" id="size" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>
    </div>

    <div class="credit">
        Developed by <span>S N C</span>
    </div>
</body>

</html>
